name: mydompet
description: "MyDompet - Personal Finance Tracker. Track your income and expenses with ease."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Networking
  dio: ^5.8.0+1

  # Dependency Injection
  get_it: ^8.0.3

  # Local Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  sqflite: ^2.4.1
  path: ^1.9.0

  # Environment
  flutter_dotenv: ^5.2.1

  # UI Enhancements
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  google_fonts: ^6.2.1
  intl: ^0.20.2

  # Connectivity
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
